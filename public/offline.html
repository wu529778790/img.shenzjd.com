<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - ImgX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        color: #fafafa;
      }
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; font-weight: 600; }
    p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
    @media (prefers-color-scheme: dark) { p { color: #999; } }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 12px;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    @media (prefers-color-scheme: dark) {
      .btn { background: #fafafa; color: #1a1a1a; }
    }
    .btn:hover { opacity: 0.85; }
    .offline-tip {
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 12px;
      background: rgba(0,0,0,0.04);
      font-size: 0.85rem;
      color: #888;
    }
    @media (prefers-color-scheme: dark) {
      .offline-tip { background: rgba(255,255,255,0.06); color: #777; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>网络连接已断开</h1>
    <p>ImgX 需要网络连接才能上传图片到 GitHub。请检查您的网络后重试。</p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/>
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
        <path d="M3 22v-6h6"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      刷新重试
    </button>
    <div class="offline-tip">
      💡 提示：已上传的图片在离线时仍可查看已缓存的缩略图
    </div>
  </div>
  <script>
    // 网络恢复时自动刷新
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
